version: '3.8'

services:
  osrm:
    image: osrm/osrm-backend:latest
    container_name: osrm-tunisia
    ports:
      - "5001:5000"
    volumes:
      - ./osrm-tunisia:/data
    working_dir: /data
    command: >
      sh -c "
        osrm-extract -p /opt/car.lua tunisia-latest.osm.pbf &&
        osrm-partition tunisia-latest.osrm &&
        osrm-customize tunisia-latest.osrm &&
        osrm-routed --algorithm mld tunisia-latest.osrm
      "
    environment:
      - OSRM_ALGORITHM=mld
    restart: unless-stopped